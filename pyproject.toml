[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sensx"
authors = [
  { name="Vegard R. Solum", email="vegard.rorvik.solum@gmail.com" },
]
description = "Sensor fusion and attitude utilities"
dynamic = ["version"]
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/vegardrsolum/sensx"
Issues = "https://github.com/vegardrsolum/sensx/issues"

[tool.hatch.version]
path = "src/sensx/__about__.py"
