name: Make Release

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: Version number [MAJOR.MINOR.PATCH] (do not include 'v' prefix)
        required: true
        type: string

jobs:
  make_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION_NUMBER: v${{ inputs.version_number }}

    steps:
      - uses: actions/checkout@v5

      - name: Make release and generate notes
        run: |
          gh release create $VERSION_NUMBER --title "$VERSION_NUMBER ($(date +'%d %B %Y'))" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
